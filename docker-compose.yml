services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor
      POSTGRES_DB: mentor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://mentor:mentor@postgres:5432/mentor
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB: ${MONGODB_DB:-smart_interview_ai}
      CHROMA_PATH: /app/storage/chroma
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
